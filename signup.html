<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mymentor.in - Student Verification</title>
    <link rel="stylesheet" href="signup.css?v=2">
</head>
<body>
     <!-- <p id="successMessage"
        class="success-message">
        Submitted Successfully✅
      </p>  -->
<div class="container">

    <!-- FORM SECTION -->
    <div id="form-section">
        <h2>Student Identity Verification</h2>

          <p id="successMessage"
           class="success-message">
             Submitted Successfully✅
      </p> 

     

         <form id="signupForm" autocomplete="off" onsubmit="event.preventDefault(); submitForm();">
    
    <!-- 1. Full Name -->
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
        <small id="nameError" class="error-text"></small>
    </div>

    <!-- 2. Phone Number -->
    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter 10-digit phone number" maxlength="10">
        <small id="phoneError" class="error-text"></small>
    </div>

    <!-- 3. Email ID -->
    <div class="form-group">
        <label for="email">Email ID</label>
        <input type="email" id="email" placeholder="Enter your email">
        <small id="emailError" class="error-text"></small>
    </div>

    <!-- 4. Upload Student ID Card -->
    <div class="form-group">
        <label for="idPhoto">Upload Student ID Card</label>
        <input type="file" id="idPhoto" accept="image/*,.pdf">
        <small id="fileError" class="error-text"></small>
    </div>

    <!-- 5. Personal Essence (Hobbies) -->
    <div class="form-group">
        <label for="hobby">Personal Essence (Hobbies/interest)</label>
        <input type="text" id="hobby" placeholder="e.g. Web development, reading, coding">
        <small id="hobbyError" class="error-text"></small>
    </div>

    <!-- 6. State/Location -->
    <div class="form-group">
        <label for="state">State/Location</label>
        <input type="text" id="state" placeholder="e.g. Haryana, Delhi, Punjab">
        <small id="stateError" class="error-text"></small>
    </div>

    <button type="submit" id="submitBtn" class="submit-btn">Submit</button>

</form>
   
   
    </div>

 

</div>

<script src="signup.js"></script>
</body>
</html>
